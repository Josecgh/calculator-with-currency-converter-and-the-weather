<div class="weather-container">
  <h2>Predicción del Tiempo</h2>

  <!-- Botones para alternar vista -->
  <div class="actions">
    <button (click)="cargarDatosNacional()" [class.active]="vistaActual === 'NACIONAL'">
      Nacional
    </button>
    <button (click)="cargarDatosAsturias()" [class.active]="vistaActual === 'ASTURIAS'">
      Asturias
    </button>
  </div>

  <!-- Selector para filtrar ciudades -->
  <div class="filter-container">
    <label for="citySelect">Selecciona una ciudad:</label>
    <select id="citySelect" (change)="onCiudadSelect($event)">
      <option value="">-- Ver todas las ciudades --</option>
      <option *ngFor="let ciudad of ciudades" [value]="ciudad.name">
        {{ ciudad.name }} ({{ ciudad.nameProvince }})
      </option>
    </select>
  </div>

  <!-- Grid/Lista de Tarjetas -->
  <div class="city-cards">
    <div class="card" *ngFor="let ciudad of ciudadesFiltradas">
      <h3>{{ ciudad.name }}</h3>
      <p class="province">{{ ciudad.nameProvince }}</p>

      <!-- Imagen según el ID del estado del cielo -->
      <img 
        [src]="getImageUrl(ciudad.stateSky.id)" 
        [alt]="ciudad.stateSky.description"
        class="weather-icon"
      />

      <p class="sky-desc">{{ ciudad.stateSky.description }}</p>

      <div class="temperatures">
        <span class="max">Máx: {{ ciudad.temperatures.max }}°C</span>
        <span class="min">Mín: {{ ciudad.temperatures.min }}°C</span>
      </div>
    </div>
  </div>
</div>
